name: Deploy csv spliter App to Server
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22 # This is the port for SSH
          script: |
            cd /root/Csv-Splitter
            git pull origin main
            docker-compose down
            docker-compose up -d --build